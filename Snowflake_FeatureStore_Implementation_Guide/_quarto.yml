project:
  type: book
  output-dir: _site
  resources:
    - "_diagrams/**"

book:
  title: "Snowflake Feature Store Implementation Guide"
  author:
    - name: "Simon Field"
      url: "https://www.linkedin.com/in/fieldy6961/"
  date: "2026-04-09"
  search: true
  repo-url: https://github.com/Snowflake-Labs/snowflake-featurestore-imp-guide
  repo-actions: [edit, issue]
  
  sidebar:
    style: docked
    search: true
  
  chapters:
    - index.qmd
    - part: "Getting Started"
      chapters:
        - 00_introduction/index.qmd
        - 01_concepts/index.qmd
    - part: "Design & Architecture"
      chapters:
        - 02_design_organization/index.qmd
        - 03_entities_hierarchies/index.qmd
        - 04_feature_views/index.qmd
    - part: "Feature Engineering"
      chapters:
        - 05_feature_pipelines/index.qmd
        - 06_temporal_features/index.qmd
        - 07_aggregations_api/index.qmd
    - part: "Production"
      chapters:
        - 08_online_features/index.qmd
        - 09_real_time_online_serving/index.qmd
        - 10_preprocessing/index.qmd
        - 11_training_inference/index.qmd
    - part: "Operations & Advanced"
      chapters:
        - 12_operations/index.qmd
        - 13_advanced_patterns/index.qmd
        - 14_migration_guide/index.qmd
  
  appendices:
    - appendices/A_sample_data/index.qmd
    - appendices/A_sample_data/data_manager/streamlit_app.qmd
    - appendices/B_setup/index.qmd
    - appendices/C_snowpark_to_dynamic_table/index.qmd
    - appendices/D_tag_convention/index.qmd

format:
  html:
    theme:
      light: [cosmo, _theme/snowflake-light.scss]
      dark:  [darkly, _theme/snowflake-dark.scss]
    include-after-body:
      - file: _theme/sidebar-toggle-include.html
    code-fold: false
    code-tools: true
    code-copy: true
    code-line-numbers: true
    toc: true
    toc-depth: 3
    number-sections: true
    highlight-style: github
    open-graph:
      title: "Snowflake Feature Store Implementation Guide"
      description: "Best practices for building production ML feature platforms with Snowflake Feature Store — entities, Feature Views, pipelines, online serving, and operations."
      site-name: "Snowflake-Labs"
    description: "Comprehensive guide to implementing Snowflake Feature Store for production ML, covering design patterns, temporal features, aggregations, online serving, and CI/CD."
    
  pdf:
    documentclass: scrreprt
    classoption:
      - parskip=half
    toc: true
    number-sections: true
    colorlinks: true
    include-in-header:
      - _pdf/preamble.tex
    fig-dpi: 150
    # Prefer Pandoc's flexible column widths when links skew width math (helps monospace tables)
    tbl-colwidths: auto

execute:
  freeze: true
  error: false
  warning: false
  
jupyter: python3

# Shared metadata
metadata:
  keywords: [snowflake, feature store, ml, machine learning, mlops]
