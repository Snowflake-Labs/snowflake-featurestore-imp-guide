name: Publish to GitHub Pages

on:
  push:
    branches:
      - main
  
  # Allow manual trigger from Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    if: >-
      github.repository == 'Snowflake-Labs/snowflake-featurestore-imp-guide' ||
      github.repository == 'snowflake-eng/snowflake-featurestore-imp-guide'
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbformat pandas numpy scikit-learn
          pip install snowflake-ml-python snowflake-snowpark-python

      - name: Set up Quarto
        run: |
          wget -q "https://github.com/quarto-dev/quarto-cli/releases/download/v1.6.43/quarto-1.6.43-linux-amd64.deb" -O quarto.deb
          sudo dpkg -i quarto.deb
          rm quarto.deb
          quarto --version

      - name: Render Quarto Book — internal (includes preview chapters)
        if: github.repository == 'snowflake-eng/snowflake-featurestore-imp-guide'
        run: |
          cd Snowflake_FeatureStore_Implementation_Guide
          QUARTO_PROFILE=internal quarto render --to html --no-execute

      - name: Render Quarto Book — public
        if: github.repository == 'Snowflake-Labs/snowflake-featurestore-imp-guide'
        run: |
          cd Snowflake_FeatureStore_Implementation_Guide
          quarto render --to html --no-execute

      - name: Determine output directory
        id: output-dir
        run: |
          if [ "${{ github.repository }}" = "snowflake-eng/snowflake-featurestore-imp-guide" ]; then
            echo "path=Snowflake_FeatureStore_Implementation_Guide/_site-internal" >> "$GITHUB_OUTPUT"
          else
            echo "path=Snowflake_FeatureStore_Implementation_Guide/_site" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.output-dir.outputs.path }}

  deploy:
    if: >-
      github.repository == 'Snowflake-Labs/snowflake-featurestore-imp-guide' ||
      github.repository == 'snowflake-eng/snowflake-featurestore-imp-guide'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
